<!DOCTYPE html>
<head>
	<title>Decimal</title>
</head>
<body>
	<style>
		* {
			background-color: #000000;
			color: #ffffff;
		}
	</style>
	<h1>Compact Decimal Test</h1>
	<script src="decimal.js"></script>
	<script src="ler.js"></script>
	<textarea type="text" id="input" style="width:100%;height:200px;">return new Decimal(10);</textarea><br>
    <button id="button">Run</button><br>
	<code id="output"></code>
	<script>
		function elementid(id) {
			return document.getElementById(id)
		}
		function load() {
			elementid("button").onclick = _ => { 
				try{
					document.getElementById("output").innerHTML=Function(document.getElementById("input").value)(); 
				}catch(error){
					document.getElementById("output").innerHTML=`<span style="color: #f00">${error.stack}</span>`
				}
			}
		}
		load()
	</script>
</body>
